spring.application.name=api-gateway
server.port=8080

eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.server.webflux.routes[0].id=livro-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://livro-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/livros/**

spring.cloud.gateway.server.webflux.routes[1].id=reserva-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://reserva-service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/reservas/**
